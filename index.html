<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Luck - Bono 100%</title>
  <meta name="description" content="Accedé a tu bono del 100%.">
  
  <style>
    /* Configuración del fondo de la pantalla completa con imagen de casino */
    body {
      margin: 0;
      padding: 0;
      background-image: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)), url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=1200&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      color: white;
    }

    /* El contenedor principal flotante */
    .card-container {
      width: 90%;
      max-width: 420px;
      background: rgba(24, 26, 32, 0.94);
      border: 2px solid #ffcc00;
      border-radius: 16px;
      padding: 35px 25px;
      text-align: center;
      box-sizing: border-box;
      box-shadow: 0 0 30px rgba(255, 204, 0, 0.35), inset 0 0 15px rgba(255, 204, 0, 0.1);
      backdrop-filter: blur(6px);
    }

    /* Título principal */
    h1 {
      margin: 0 0 6px 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #ffffff;
    }

    /* Subtítulo */
    .subtitle {
      margin: 0 0 28px 0;
      font-size: 13px;
      font-weight: 600;
      color: #ccaacc;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* Etiqueta arriba del input */
    .input-label {
      font-size: 12px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* El campo de texto gris oscuro */
    .input-field {
      width: 100%;
      box-sizing: border-box;
      background: #3a3d45; 
      border: 1px solid #555861;
      border-radius: 8px;
      padding: 14px;
      font-size: 16px;
      color: #ffffff;
      text-align: center;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      border-color: #ffcc00;
    }

    .input-field::placeholder {
      color: #b0b3bc;
      opacity: 1;
    }

    /* Botón verde brillante */
    .btn-submit {
      width: 100%;
      background: linear-gradient(180deg, #00e676 0%, #00b34a 100%);
      border: none;
      border-radius: 8px;
      padding: 15px;
      font-size: 17px;
      font-weight: 700;
      color: #ffffff;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(0, 230, 118, 0.35);
      transition: transform 0.1s, filter 0.2s;
      margin-bottom: 30px;
    }

    .btn-submit:hover {
      filter: brightness(1.1);
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    /* --- SECCIÓN DE ICONOS INFERIORES --- */
    .features-container {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-top: 1px solid rgba(255, 204, 0, 0.2);
      padding-top: 25px;
      gap: 10px;
    }

    .feature-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .feature-icon {
      width: 50px;
      height: 50px;
      margin-bottom: 8px;
    }

    .feature-text {
      font-size: 10px;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      line-height: 1.2;
    }
  </style>

  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '887455550280201');
    fbq('track', 'PageView');
  </script>
</head>
<body>

<div class="card-container">
  <h1>Good Luck</h1>
  <div class="subtitle">Accedé a tu bono del 100%</div>
  
  <div class="input-label">Brindanos tu nombre para acceder a tu usuario:</div>
  
  <input id="nombreCliente" class="input-field" type="text" placeholder="Escribí tu nombre aquí" required autocomplete="off">
  
  <button onclick="irAWhatsApp()" class="btn-submit">
    Obtenlo Ahora
  </button>

  <div class="features-container">
    <div class="feature-item">
      <svg class="feature-icon" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="44" fill="none" stroke="#ffcc00" stroke-width="4" stroke-dasharray="2 2" />
        <circle cx="50" cy="50" r="38" fill="none" stroke="#ffcc00" stroke-width="3" />
        <text x="50" y="58" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#ffcc00" text-anchor="middle">18+</text>
      </svg>
      <div class="feature-text">Términos para<br>mayores de edad</div>
    </div>

    <div class="feature-item">
      <svg class="feature-icon" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="44" fill="none" stroke="#ffcc00" stroke-width="4" stroke-dasharray="2 2" />
        <path d="M50 20 A 30 30 0 1 1 23 38" fill="none" stroke="#ffcc00" stroke-width="3" stroke-linecap="round"/>
        <polygon points="23,28 23,38 33,38" fill="#ffcc00" />
        <text x="50" y="58" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#ffcc00" text-anchor="middle">24h</text>
      </svg>
      <div class="feature-text">Atención<br>24 Hs</div>
    </div>

    <div class="feature-item">
      <svg class="feature-icon" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="44" fill="none" stroke="#ffcc00" stroke-width="4" stroke-dasharray="2 2" />
        <path d="M32 65 L68 65 M50 30 L50 65 M40 30 L60 30 M32 35 L32 50 A 8 8 0 0 0 48 50 Z M52 35 L52 50 A 8 8 0 0 0 68 50 Z" fill="none" stroke="#ffcc00" stroke-width="3" stroke-linejoin="round"/>
      </svg>
      <div class="feature-text">Juego<br>Responsable</div>
    </div>
  </div>
</div>

<script>
function irAWhatsApp() {
  const inputNombre = document.getElementById("nombreCliente");
  const nombre = inputNombre.value.trim();
  
  if (nombre === "") {
    alert("Por favor, completá el campo para continuar.");
    inputNombre.focus();
    return;
  }

  // Evento de Conversión para Facebook Ads
  fbq('track', 'Lead', {
    content_name: 'Registro Good Luck',
    value: 1.0,
    currency: 'USD'
  });

  // --- CONFIGURACIÓN DEL ROTADOR ---
  // Reemplazá acá abajo los números por tus líneas reales conectadas a Whaticket:
  const listaNumeros = [
    "5492235337483", // Número Principal
    "5492235000000", // Número Contingencia 2
    "5492235111111"  // Número Contingencia 3
  ];

  // Selección matemática aleatoria dentro de la lista
  const numeroElegido = listaNumeros[Math.floor(Math.random() * listaNumeros.length)];
  const mensaje = `¡Hola! Mi nombre es: ${nombre}. Quiero registrarme en Good Luck y obtener mi bono del 100%.`;
  
  // --- DETECTOR INTELIGENTE DE DISPOSITIVOS ---
  let url = "";
  const esCelular = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (esCelular) {
    // Abre la app directo en iPhone y Android sin pasar por pantallas intermedias
    url = `whatsapp://send?phone=${numeroElegido}&text=` + encodeURIComponent(mensaje);
  } else {
    // Formato optimizado para computadoras de escritorio
    url = `https://web.whatsapp.com/send?phone=${numeroElegido}&text=` + encodeURIComponent(mensaje);
  }

  // Retraso técnico para asegurar el tracking del píxel antes de la redirección
  setTimeout(function(){
    window.location.href = url;
  }, 400);
}
</script>

</body>
</html>
